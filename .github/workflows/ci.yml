name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Type Check
        run: mypy src
      - name: Golden Check
        run: PYTHONPATH=src python tools/golden.py --check
      - name: Tests
        run: pytest -q
      - name: Build Package
        run: python -m pip wheel . -w dist
